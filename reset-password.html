<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Routes Payroll</title>
    <link rel="stylesheet" href="styles.css?v=20260407g" />
  </head>
  <body>
    <main class="shell">
      <section class="auth-view" style="grid-template-columns: 1fr; max-width: 760px; margin: 0 auto;">
        <div class="auth-card panel" autocomplete="off">
          <h2>Set New Password</h2>
          <p>Enter a strong new password for your account.</p>

          <label>
            New Password
            <div class="password-field">
              <input id="resetNewPassword" type="password" minlength="8" maxlength="80" required />
              <button class="password-toggle" type="button" data-password-target="resetNewPassword" aria-label="Show password" aria-pressed="false">👁</button>
            </div>
          </label>
          <label>
            Confirm New Password
            <div class="password-field">
              <input id="resetConfirmPassword" type="password" minlength="8" maxlength="80" required />
              <button class="password-toggle" type="button" data-password-target="resetConfirmPassword" aria-label="Show password" aria-pressed="false">👁</button>
            </div>
          </label>
          <button id="resetSubmitBtn" type="button">Update Password</button>
          <p id="resetMessage" class="status-msg"></p>
          <p class="subtitle" style="margin-top:8px;">After reset, return to <a href="/">Sign In</a>.</p>
        </div>
      </section>
    </main>

    <script src="reset-password.js?v=20260407e"></script>
  </body>
</html>
